<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CART - NEON EC</title>

<style>
body {
    background: #0b0f1a;
    color: #00fff0;
    font-family: 'Courier New', monospace;
}

/* ヘッダー */
h1 {
    text-align: center;
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff;
}

/* ボタン */
a, button {
    color: #0ff;
    text-decoration: none;
    border: 1px solid #0ff;
    padding: 4px 8px;
    margin-left: 10px;
    background: transparent;
    box-shadow: 0 0 8px #0ff;
}

/* カード */
.card {
    border: 1px solid #0ff;
    padding: 10px;
    margin: 10px;
    box-shadow: 0 0 10px #0ff;
    background: rgba(0,0,0,0.4);
}

/* グリッド */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
</style>

<style>
.nav {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.nav a {
    color: #0ff;
    border: 1px solid #0ff;
    padding: 8px 12px;
    text-decoration: none;
    box-shadow: 0 0 10px #0ff;
    background: rgba(0,0,0,0.5);
}
</style>

<div class="nav">
    <a href="/list">ホーム画面へ</a>
    <a href="/logout">ログアウト</a>
</div>

<style>
body {
    background: #0b0f1a;
    color: #00fff0;
    font-family: monospace;
}

h1 {
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff;
    text-align: center;
}

.card {
    border: 1px solid #0ff;
    margin: 10px;
    padding: 10px;
    box-shadow: 0 0 10px #0ff;
}

a {
    color: #0ff;
    border: 1px solid #0ff;
    padding: 5px;
    text-decoration: none;
}
</style>

</head>
<body>

<h1>カート内容</h1>

<a href="/list">戻る</a>
<a href="/cart/checkout">決済へ</a>
<a href="/cart/clear">カートをクリア</a>

<hr>

<div th:each="i : ${items}" class="card">
    商品名：<b th:text="${i.name}"></b><br>
    価格：<span th:text="${i.price}"></span>円<br>
    数量：<span th:text="${i.quantity}"></span>
</div>
</body>
</html>
