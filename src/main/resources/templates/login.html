<!DOCTYPE html>
<html>
<head>

    height: 100vh;
}

.box {
    border: 1px solid #0ff;

    padding: 10px 20px;

<body>

<div class="box">
    <h1>NEON EC</h1>
    <p>ログインボタンだけでログインできます</p>

    <a href="/list">ログイン</a>
